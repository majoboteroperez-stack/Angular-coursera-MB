<div class="container mt-4">
  <h2 class="text-primary">Lista de tareas - Maria Jose</h2>

  <input #taskInput class="form-control mb-2" placeholder="Escribe una tarea">

  <button (click)="addTask(taskInput.value); taskInput.value=''" 
          class="btn btn-success mb-3">
    Agregar tarea
  </button>

  <ul class="list-group">
    <li *ngFor="let task of tasks" class="list-group-item">
      {{ task }}
    </li>
  </ul>
</div>
